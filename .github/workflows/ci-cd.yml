name: SIEM Automated Testing

# ให้ทำงานทุกครั้งที่มีการ Push โค้ดขึ้นสาขา main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest requests

    - name: Run Unit Tests
      # สั่งให้วิ่งเข้าไปในโฟลเดอร์ backend แล้วรันเทสต์
      run: |
        cd backend
        pytest test_syslog.py
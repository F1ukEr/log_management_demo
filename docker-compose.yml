version: '3.8'

services:
  # 1. Database: ใช้ Postgres สำหรับเก็บ Schema กลาง และ JSONB สำหรับ log ดิบ
  db:
    image: postgres:15-alpine
    container_name: log_db
    environment:
      POSTGRES_USER: loguser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logmanagement
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Backend API: รับ Log, ทำ Normalization และบันทึกลง DB
  backend:
    build: ./backend
    container_name: log_backend
    ports:
      - "8000:8000"
      - "5140:5140/udp" # 🌟 เพิ่มพอร์ต UDP 5140 สำหรับรับ Syslog ทะลุเข้า Docker
    environment:
      - DATABASE_URL=postgresql://loguser:password@db:5432/logmanagement
    depends_on:
      - db

  # 3. Frontend UI: React Dashboard สำหรับแสดงผล Top IP/User และ Alert
  frontend:
    build: ./frontend
    container_name: log_frontend
    ports:
      - "3000:80" # เข้าเว็บผ่าน http://localhost:3000
      - "3443:443" # เข้าเว็บผ่าน https://localhost:3443 สำหรับการทดสอบ
    volumes:
      - ./nginx-custom.conf:/etc/nginx/conf.d/default.conf # ใช้ Nginx แบบกำหนดเองเพื่อรองรับ HTTP และ HTTPS
      - ./certs:/etc/nginx/certs # ใส่ใบรับรอง SSL สำหรับ HTTPS
    depends_on:
      - backend

volumes:
  pgdata: